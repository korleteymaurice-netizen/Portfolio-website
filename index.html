<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maurice Portfolio</title>
    <style>
    
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');


* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}


body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to bottom right, #eaf6ff, #d6efff);
    color: #1e3a5f;
    line-height: 1.6;
    padding: 40px 20px;
    text-align: center;
}


h1 {
    font-size: 3rem;
    color: #0f4c81;
    margin-bottom: 10px;
    font-weight: 700;
}

h2 {
    margin: 20px 0 10px;
    font-weight: 500;
    color: #256fa8;
}

hr {
    border: none;
    height: 2px;
    background-color: #9ed8ff;
    width: 80%;
    margin: 30px auto;
    border-radius: 10px;
}


a {
    text-decoration: none;
    color: #0b6cb8;
    transition: color 0.3s ease;
}

a:hover {
    color: #063970;
}


img {
    width: 100%;
    max-width: 600px;
    border-radius: 18px;
    margin: 15px 0 40px;
    box-shadow: 0 10px 25px rgba(0, 80, 140, 0.15);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}


img:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 35px rgba(0, 80, 140, 0.25);
}


h3 {
    margin-top: 20px;
    font-weight: 500;
}

h3 a {
    margin: 0 15px;
    font-size: 1.1rem;
}


@media (max-width: 768px) {
    body {
        padding: 25px 15px;
    }

    h1 {
        font-size: 2.3rem;
    }

    h2 {
        font-size: 1.3rem;
    }

    img {
        max-width: 100%;
    }

    h3 a {
        display: inline-block;
        margin: 10px;
    }
}

@media (max-width: 480px) {
    h1 {
        font-size: 2rem;
    }

    h2 {
        font-size: 1.1rem;
    }

    body {
        padding: 20px 10px;
    }

    h3 {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
}

    </style>
    
</head>
